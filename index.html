<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90 Дней · Челлендж</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --text: #f0ede8;
    --muted: #7a7890;
    --accent1: #e8c97d;
    --accent2: #c97d9e;
    --accent3: #7dc9b4;
    --accent4: #7d9de8;
    --accent5: #e89a7d;
    --green: #7dc97d;
    --tg-safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* Telegram light theme override */
  body.tg-light {
    --bg: #f0f0f5;
    --surface: #ffffff;
    --surface2: #e8e8f0;
    --border: #d0d0de;
    --text: #1a1a2e;
    --muted: #8888a0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px calc(60px + var(--tg-safe-bottom));
    transition: background 0.3s, color 0.3s;
  }

  header {
    text-align: center;
    padding: 40px 0 32px;
    position: relative;
  }

  header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, transparent, var(--accent1));
  }

  .subtitle {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent1);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -1px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent2);
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin: 28px 0 0;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent1);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Progress ring */
  .ring-wrap {
    display: flex;
    justify-content: center;
    margin: 36px 0 28px;
  }

  .ring-svg { overflow: visible; }

  .ring-track { fill: none; stroke: var(--surface2); stroke-width: 6; }
  .ring-fill {
    fill: none; stroke-width: 6;
    stroke-linecap: round;
    stroke: url(#ringGrad);
    transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
    transform-origin: center;
    transform: rotate(-90deg);
  }

  .ring-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    fill: var(--text);
    dominant-baseline: central;
    text-anchor: middle;
  }

  .ring-sub {
    font-size: 10px;
    fill: var(--muted);
    letter-spacing: 2px;
    dominant-baseline: central;
    text-anchor: middle;
  }

  /* Habits */
  .section-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
  }

  .habits-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    max-width: 480px;
    margin: 0 auto 32px;
  }

  .habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .habit-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--color);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .habit-card.done {
    border-color: var(--color);
    background: color-mix(in srgb, var(--color) 8%, var(--surface));
  }

  .habit-card.done::before { opacity: 1; }

  .habit-card:active { transform: scale(0.97); }

  .habit-icon { font-size: 22px; margin-bottom: 8px; }

  .habit-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  .habit-detail {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  .habit-check {
    position: absolute;
    top: 12px; right: 12px;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    transition: all 0.2s;
  }

  .habit-card.done .habit-check {
    background: var(--color);
    border-color: var(--color);
  }

  /* Day grid */
  .day-section {
    max-width: 480px;
    margin: 0 auto 32px;
  }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
  }

  .day-dot {
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    border: 1px solid transparent;
  }

  .day-dot.today {
    border-color: var(--accent1);
    box-shadow: 0 0 8px color-mix(in srgb, var(--accent1) 40%, transparent);
  }

  .day-dot.completed {
    background: linear-gradient(135deg, var(--accent3), var(--accent4));
  }

  .day-dot.partial {
    background: linear-gradient(135deg, var(--accent1), var(--accent5));
    opacity: 0.6;
  }

  .day-dot.future { opacity: 0.3; cursor: default; }

  .day-dot:hover:not(.future) { transform: scale(1.15); }

  /* Streak / notes */
  .bottom-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 480px;
    margin: 0 auto 28px;
  }

  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    text-align: center;
  }

  .info-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    line-height: 1;
  }

  .info-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Date nav */
  .date-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    max-width: 480px;
    margin: 0 auto 24px;
  }

  .date-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 36px; height: 36px;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .date-btn:hover { border-color: var(--accent1); color: var(--accent1); }

  .date-display {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    min-width: 180px;
    text-align: center;
  }

  .date-day-num {
    color: var(--accent1);
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    display: block;
    margin-top: 2px;
    font-weight: 300;
    color: var(--muted);
  }

  /* Save btn */
  .save-btn {
    display: block;
    width: calc(100% - 32px);
    max-width: 448px;
    margin: 0 auto 16px;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border: none;
    border-radius: 14px;
    color: #0e0e0f;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .save-btn:hover { opacity: 0.9; }
  .save-btn:active { transform: scale(0.98); }

  .saved-toast {
    position: fixed;
    bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #0e0e0f;
    padding: 10px 24px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    z-index: 100;
  }

  .saved-toast.show { transform: translateX(-50%) translateY(0); }

  /* Legend */
  .legend {
    display: flex; gap: 16px; justify-content: center;
    max-width: 480px; margin: 0 auto 10px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
  }

  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px;
  }
</style>
</head>
<body>

<header>
  <div class="subtitle">Трансформация · 2026</div>
  <h1>90 Дней<br><em>Новой Себя</em></h1>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="doneCount">0</div>
      <div class="stat-label">Дней готово</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="remainCount">90</div>
      <div class="stat-label">Осталось</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="pctCount">0%</div>
      <div class="stat-label">Прогресс</div>
    </div>
  </div>
</header>

<!-- Ring -->
<div class="ring-wrap">
  <svg class="ring-svg" width="120" height="120" viewBox="0 0 120 120">
    <defs>
      <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#e8c97d"/>
        <stop offset="100%" stop-color="#c97d9e"/>
      </linearGradient>
    </defs>
    <circle class="ring-track" cx="60" cy="60" r="52"/>
    <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="52"
      stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
    <text class="ring-text" x="60" y="56" id="ringPct">0%</text>
    <text class="ring-sub" x="60" y="73">сегодня</text>
  </svg>
</div>

<!-- Date nav -->
<div class="date-nav">
  <button class="date-btn" onclick="changeDay(-1)">‹</button>
  <div>
    <div class="date-display" id="dateDisplay">—</div>
    <span class="date-day-num" id="dayNumDisplay"></span>
  </div>
  <button class="date-btn" onclick="changeDay(1)">›</button>
</div>

<!-- Habits -->
<p class="section-title">Привычки дня</p>
<div class="habits-grid" id="habitsGrid"></div>

<!-- Save (shown only outside Telegram) -->
<button class="save-btn" id="saveBtnFallback" onclick="saveDay()">Сохранить день ✓</button>

<!-- Bottom cards -->
<div class="bottom-cards">
  <div class="info-card">
    <div class="info-num" style="color: var(--accent1)" id="streakNum">0</div>
    <div class="info-label">🔥 Серия дней</div>
  </div>
  <div class="info-card">
    <div class="info-num" style="color: var(--accent3)" id="perfectNum">0</div>
    <div class="info-label">⭐ Идеальных</div>
  </div>
</div>

<!-- Day grid -->
<div class="day-section">
  <p class="section-title" style="margin-bottom:10px">90 Дней</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#7dc9b4,#7d9de8)"></div>Полный</div>
    <div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#e8c97d,#e89a7d);opacity:.7"></div>Частичный</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1e1e24"></div>Пусто</div>
  </div>
  <div class="day-grid" id="dayGrid"></div>
</div>

<div class="saved-toast" id="toast">✓ Сохранено</div>

<script>
// ── Telegram WebApp integration ──────────────────────────────
const tg = window.Telegram?.WebApp;

if (tg) {
  tg.ready();
  tg.expand(); // full-screen

  // Theme: apply light class if Telegram is in light mode
  const applyTgTheme = () => {
    const isDark = tg.colorScheme === 'dark';
    document.body.classList.toggle('tg-light', !isDark);
  };
  applyTgTheme();
  tg.onEvent('themeChanged', applyTgTheme);

  // Hide fallback save button — use MainButton instead
  document.getElementById('saveBtnFallback').style.display = 'none';

  tg.MainButton.setText('Сохранить день ✓');
  tg.MainButton.color = '#e8c97d';
  tg.MainButton.textColor = '#0e0e0f';
  tg.MainButton.show();
  tg.MainButton.onClick(() => saveDay());

  // BackButton — go to previous day if not day 1
  tg.BackButton.onClick(() => {
    if (currentOffset > 0) changeDay(-1);
    else tg.close();
  });
}

// ── App data ──────────────────────────────────────────────────
const HABITS = [
  { id: 'steps',   icon: '👟', name: '10 000 шагов',    detail: 'Ходьба / прогулка',      color: '#e8c97d' },
  { id: 'food',    icon: '🥗', name: 'Питание 1700 кк', detail: 'Без превышения нормы',   color: '#7dc9b4' },
  { id: 'sleep',   icon: '🌙', name: 'Сон 7–9 часов',   detail: 'Подъём в одно время',    color: '#7d9de8' },
  { id: 'skin',    icon: '✨', name: 'Уход за кожей',   detail: 'Утро + вечер',           color: '#c97d9e' },
  { id: 'workout', icon: '🏋️', name: 'Спорт / коврик',  detail: '3×/нед тренировка или 30 мин дома', color: '#e89a7d' },
  { id: 'water',   icon: '💧', name: 'Вода 1.5–2 л',    detail: 'Норма воды за день',     color: '#7dc9b4' },
];

const TOTAL_DAYS = 90;

// Start date: fixed forever
const startDate = new Date('2026-06-01');
startDate.setHours(0,0,0,0);

let data = {}; // { "YYYY-MM-DD": { steps: bool, food: bool, ... } }

// currentOffset = сколько дней прошло с startDate до сегодня
const _today = new Date(); _today.setHours(0,0,0,0);
let currentOffset = Math.round((_today - startDate) / 86400000);
currentOffset = Math.max(0, Math.min(currentOffset, TOTAL_DAYS - 1));

function dateKey(offset) {
  const d = new Date(startDate);
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10);
}

function dayNumber(offset) { return offset + 1; }

function loadData() {
  try { data = JSON.parse(localStorage.getItem('ch90_data') || '{}'); } catch(e) { data = {}; }
}

function saveData() {
  localStorage.setItem('ch90_data', JSON.stringify(data));
}

function getDayData(offset) {
  const key = dateKey(offset);
  return data[key] || {};
}

function setHabit(habitId, val) {
  const key = dateKey(currentOffset);
  if (!data[key]) data[key] = {};
  data[key][habitId] = val;
}

function completionRatio(offset) {
  const d = getDayData(offset);
  const done = HABITS.filter(h => d[h.id]).length;
  return done / HABITS.length;
}

function isPerfect(offset) { return completionRatio(offset) === 1; }

function renderHabits() {
  const grid = document.getElementById('habitsGrid');
  const dayD = getDayData(currentOffset);
  grid.innerHTML = '';
  HABITS.forEach(h => {
    const done = !!dayD[h.id];
    const card = document.createElement('div');
    card.className = 'habit-card' + (done ? ' done' : '');
    card.style.setProperty('--color', h.color);
    card.innerHTML = `
      <div class="habit-check">${done ? '✓' : ''}</div>
      <div class="habit-icon">${h.icon}</div>
      <div class="habit-name">${h.name}</div>
      <div class="habit-detail">${h.detail}</div>
    `;
    card.addEventListener('click', () => {
      setHabit(h.id, !done);
      renderAll();
    });
    grid.appendChild(card);
  });

  // Ring
  const ratio = completionRatio(currentOffset);
  const circ = 326.7;
  document.getElementById('ringFill').style.strokeDashoffset = circ * (1 - ratio);
  document.getElementById('ringPct').textContent = Math.round(ratio * 100) + '%';
}

function renderDateNav() {
  const d = new Date(startDate);
  d.setDate(d.getDate() + currentOffset);
  const options = { weekday: 'long', day: 'numeric', month: 'long' };
  const str = d.toLocaleDateString('ru-RU', options);
  document.getElementById('dateDisplay').textContent = str.charAt(0).toUpperCase() + str.slice(1);
  document.getElementById('dayNumDisplay').textContent = `День ${dayNumber(currentOffset)} из ${TOTAL_DAYS}`;
}

function renderDayGrid() {
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';
  for (let i = 0; i < TOTAL_DAYS; i++) {
    const dot = document.createElement('div');
    const isFuture = i > (new Date() - startDate) / 86400000;
    const ratio = completionRatio(i);
    dot.className = 'day-dot';
    if (i === currentOffset) dot.classList.add('today');
    if (!isFuture) {
      if (ratio === 1) dot.classList.add('completed');
      else if (ratio > 0) dot.classList.add('partial');
    } else {
      dot.classList.add('future');
    }
    dot.title = `День ${i+1}`;
    dot.addEventListener('click', () => {
      if (!isFuture) { currentOffset = i; renderAll(); }
    });
    grid.appendChild(dot);
  }
}

function renderStats() {
  let completedDays = 0, perfect = 0;
  for (let i = 0; i < TOTAL_DAYS; i++) {
    const r = completionRatio(i);
    if (r > 0) completedDays++;
    if (r === 1) perfect++;
  }
  document.getElementById('doneCount').textContent = completedDays;
  document.getElementById('remainCount').textContent = TOTAL_DAYS - completedDays;
  document.getElementById('pctCount').textContent = Math.round(completedDays / TOTAL_DAYS * 100) + '%';
  document.getElementById('perfectNum').textContent = perfect;

  // Streak — count backwards from today
  const _tn = new Date(); _tn.setHours(0,0,0,0);
  const todayOff = Math.round((_tn - startDate) / 86400000);
  let streak = 0;
  for (let i = todayOff; i >= 0; i--) {
    if (completionRatio(i) === 1) streak++;
    else break;
  }
  document.getElementById('streakNum').textContent = streak;
}

function renderAll() {
  renderDateNav();
  renderHabits();
  renderDayGrid();
  renderStats();
}

function changeDay(dir) {
  const newOff = currentOffset + dir;
  if (newOff >= 0 && newOff < TOTAL_DAYS) {
    currentOffset = newOff;
    renderAll();
    // Show BackButton only when not on day 1
    if (tg) {
      currentOffset > 0 ? tg.BackButton.show() : tg.BackButton.hide();
    }
  }
}

function saveDay() {
  saveData();
  // Telegram haptic feedback
  tg?.HapticFeedback?.notificationOccurred('success');
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

loadData();
renderAll();
</script>
</body>
</html>
